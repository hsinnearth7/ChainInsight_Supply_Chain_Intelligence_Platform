# ChainInsight Configuration — Supply Chain Forecasting + Capacity Planning + S&OP
# All hard-coded values extracted here for reproducibility and easy tuning.

data:
  n_skus: 200
  n_warehouses: 3
  warehouse_names: ["NYC", "LAX", "CHI"]
  n_categories: 4
  n_subcategories_per_category: 5
  history_days: 730
  frequency: "D"
  hierarchy_levels: ["national", "warehouse", "category", "sku"]
  # M5-style statistical properties
  intermittent_demand_pct: 0.30       # 30% of SKUs have 50%+ zero-demand days
  price_elasticity_range: [-0.15, -0.05]
  censored_demand: true
  seed: 42

model:
  default: "lightgbm"
  naive:
    window: 30
  sarimax:
    order: [1, 1, 1]
    seasonal_order: [1, 1, 1, 7]
  xgboost:
    n_estimators: 200
    max_depth: 5
    learning_rate: 0.1
  lightgbm:
    n_estimators: 300
    num_leaves: 31
    learning_rate: 0.1
  chronos:
    model_name: "amazon/chronos-t5-small"
    prediction_length: 14
  routing:
    cold_start_threshold_days: 60
    intermittency_threshold: 0.5
  prophet:
    yearly_seasonality: true
    weekly_seasonality: true
    changepoint_prior_scale: 0.05
  lstm:
    hidden_size: 32
    num_layers: 1
    lookback: 30
    epochs: 50
    learning_rate: 0.001
  nbeats:
    input_size: 30
    horizon: 14
    max_steps: 100
    n_harmonics: 3
    poly_degree: 2
  tft:
    input_size: 30
    horizon: 14
    max_steps: 100

evaluation:
  cv_windows: 12
  step_size: 30
  horizon: 14
  metrics: ["mape", "rmse", "mae", "coverage_90"]
  significance_alpha: 0.05
  conformal_target_coverage: 0.90

capacity:
  production_lines: 3
  shift_hours: 8
  max_overtime_hours: 4
  changeover_cost_per_hour: 150
  utilization_target: 0.85
  planning_horizon_days: 90

sensing:
  signal_sources: ["pos", "social", "weather"]
  pos_weight: 0.6
  social_weight: 0.25
  weather_weight: 0.15
  decay_half_life_days: 7
  spike_threshold_sigma: 2.5
  sensing_horizon_days: 14

sop:
  default_scenarios: ["baseline", "optimistic", "conservative"]
  planning_horizon_days: 90
  time_bucket: "weekly"
  target_fill_rate: 0.95
  target_inventory_turns: 12
  stockout_penalty: 50.0
  holding_cost_rate: 0.25

supply_chain:
  ordering_cost: 50       # $/order
  holding_rate: 0.25      # 25% of unit cost per year
  stockout_penalty: 50.0  # $/unit
  monte_carlo_sims: 5000
  ga_population: 100
  ga_generations: 80
  ga_mutation_rate: 0.15
  ga_crossover_rate: 0.80

monitoring:
  drift_threshold_ks: 0.05
  drift_threshold_psi: 0.1
  retrain_trigger_days: 7
  mape_alert_threshold: 0.20

analysis:
  dsi_sentinel: 999
  abc_threshold_a: 80
  abc_threshold_b: 95
  supply_risk_weights: [0.4, 0.4, 0.2]
  shapiro_sample_limit: 500
  risk_level_bins: [0, 0.3, 0.5, 0.7, 1.0]
  risk_level_labels: ["Low", "Medium", "High", "Critical"]

chart:
  dpi: 150
  bg_color: "#F0F2F6"
  text_color: "#1B2A4A"
  palette:
    primary: "#2E86C1"
    success: "#27AE60"
    danger: "#E74C3C"
    warning: "#F39C12"
    purple: "#8E44AD"
    teal: "#1ABC9C"
    gray: "#95A5A6"

server:
  max_upload_mb: 10
  rate_limit_per_minute: 30
  cors_origins:
    - "http://localhost:5173"
    - "http://localhost:3000"
